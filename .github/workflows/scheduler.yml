name: 일일 HR 뉴스레터 자동화

on:
  # 평일(월~금) 한국 시간 아침 8시 정각 자동 실행 (UTC 기준 전날 23시)
  schedule:
    - cron: '0 23 * * 1-5'
  
  # 필요할 때 언제든 수동으로 실행할 수 있는 버튼도 유지합니다.
  workflow_dispatch:

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          pip install requests beautifulsoup4 feedparser

      - name: 뉴스레터 스크립트 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python main.py
